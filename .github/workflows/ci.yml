name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      latex: ${{ steps.filter.outputs.latex }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            code:
              - '**/*.{ts,tsx,js,jsx,json,md}'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
              - 'tsconfig.json'
            latex:
              - 'docs/**/*.tex'
              - 'refs/**/*.bib'

  # --- CODE JOBS ---
  # Always emit a check result (success when skipped) so branch protection is not stuck
  # "Waiting for status" when this PR only touches docs/LaTeX paths.

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: always() && needs.detect-changes.result == 'success'
    steps:
      - name: Skip — no code changes
        if: needs.detect-changes.outputs.code != 'true'
        run: echo "No matching code paths; Type Check not required."
      - uses: actions/checkout@v4
        if: needs.detect-changes.outputs.code == 'true'
      - uses: ./.github/actions/setup
        if: needs.detect-changes.outputs.code == 'true'
      - run: pnpm type-check
        if: needs.detect-changes.outputs.code == 'true'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: detect-changes
    if: always() && needs.detect-changes.result == 'success'
    steps:
      - name: Skip — no code changes
        if: needs.detect-changes.outputs.code != 'true'
        run: echo "No matching code paths; Lint not required."
      - uses: actions/checkout@v4
        if: needs.detect-changes.outputs.code == 'true'
      - uses: ./.github/actions/setup
        if: needs.detect-changes.outputs.code == 'true'
      - run: pnpm lint
        if: needs.detect-changes.outputs.code == 'true'

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: always() && needs.detect-changes.result == 'success'
    steps:
      - name: Skip — no code changes
        if: needs.detect-changes.outputs.code != 'true'
        run: echo "No matching code paths; Format Check not required."
      - uses: actions/checkout@v4
        if: needs.detect-changes.outputs.code == 'true'
      - uses: ./.github/actions/setup
        if: needs.detect-changes.outputs.code == 'true'
      - run: pnpm format:check || (echo "Run 'pnpm format' to fix." && exit 1)
        if: needs.detect-changes.outputs.code == 'true'

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: detect-changes
    if: always() && needs.detect-changes.result == 'success'
    steps:
      - name: Skip — no code changes
        if: needs.detect-changes.outputs.code != 'true'
        run: echo "No matching code paths; Build not required."
      - uses: actions/checkout@v4
        if: needs.detect-changes.outputs.code == 'true'
      - uses: ./.github/actions/setup
        if: needs.detect-changes.outputs.code == 'true'
      - run: pnpm build
        if: needs.detect-changes.outputs.code == 'true'

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: detect-changes
    if: always() && needs.detect-changes.result == 'success'
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: hitchly_db
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hitchly_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Skip — no code changes
        if: needs.detect-changes.outputs.code != 'true'
        run: echo "No matching code paths; Test not required."
      - uses: actions/checkout@v4
        if: needs.detect-changes.outputs.code == 'true'
      - uses: ./.github/actions/setup
        if: needs.detect-changes.outputs.code == 'true'
      - name: Push DB Schema
        if: needs.detect-changes.outputs.code == 'true'
        run: pnpm --filter api db:push
      - name: Test
        if: needs.detect-changes.outputs.code == 'true'
        run: pnpm test

  # --- LATEX JOBS ---
  # Always emit a check when LaTeX paths unchanged (see code jobs above).

  latex-lint:
    name: LaTeX Lint
    runs-on: ubuntu-latest
    needs: detect-changes
    if: always() && needs.detect-changes.result == 'success'
    steps:
      - name: Skip — no LaTeX changes
        if: needs.detect-changes.outputs.latex != 'true'
        run: echo "No matching LaTeX paths; LaTeX Lint not required."
      - uses: actions/checkout@v4
        if: needs.detect-changes.outputs.latex == 'true'
      - name: Install ChkTeX
        if: needs.detect-changes.outputs.latex == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y chktex
      - name: Lint LaTeX files
        if: needs.detect-changes.outputs.latex == 'true'
        run: |
          SKIP_FILES="Common.tex Comments.tex"
          ERROR_FOUND=0
          find docs -name "*.tex" -type f | while read texfile; do
            filename=$(basename "$texfile")
            if echo "$SKIP_FILES" | grep -q "$filename"; then continue; fi
            if grep -q "\\documentclass" "$texfile"; then
              echo "Linting: $texfile"
              chktex -q -n24 -n13 -n8 "$texfile" || { echo "ERROR: ChkTeX found issues in $texfile"; ERROR_FOUND=1; }
            fi
          done
          if [ $ERROR_FOUND -eq 1 ]; then echo "One or more LaTeX files have linting errors"; exit 1; fi

  latex-format-check:
    name: LaTeX Format Check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: always() && needs.detect-changes.result == 'success'
    steps:
      - name: Skip — no LaTeX changes
        if: needs.detect-changes.outputs.latex != 'true'
        run: echo "No matching LaTeX paths; LaTeX Format Check not required."
      - uses: actions/checkout@v4
        if: needs.detect-changes.outputs.latex == 'true'
      - name: Install LaTeX and latexindent
        if: needs.detect-changes.outputs.latex == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-extra perl
      - name: Check LaTeX formatting
        if: needs.detect-changes.outputs.latex == 'true'
        run: |
          SKIP_FILES="Common.tex Comments.tex"
          ERROR_FOUND=0
          find docs -name "*.tex" -type f | while read texfile; do
            filename=$(basename "$texfile")
            if echo "$SKIP_FILES" | grep -q "$filename"; then continue; fi
            if grep -q "\\documentclass" "$texfile"; then
              echo "Checking formatting: $texfile"
              TEMP_FILE=$(mktemp)
              latexindent -w -c "$texfile" -o "$TEMP_FILE" 2>/dev/null || true
              if ! diff -q -w "$texfile" "$TEMP_FILE" > /dev/null 2>&1; then
                echo "ERROR: $texfile is not properly formatted"
                echo "Run: latexindent -w $texfile"
                ERROR_FOUND=1
              fi
              rm -f "$TEMP_FILE"
            fi
          done
          if [ $ERROR_FOUND -eq 1 ]; then echo "One or more LaTeX files are not properly formatted"; exit 1; fi

  latex-compile:
    name: LaTeX Compilation
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.latex == 'true'
    strategy:
      fail-fast: false
      matrix:
        directory:
          - Checklists
          - Design/SoftArchitecture
          - Design/SoftDetailedDes
          - DevelopmentPlan
          - HazardAnalysis
          - ProblemStatementAndGoals
          - ReflectAndTrace
          - SRS
          - UserGuide
          - VnVPlan
          - VnVReport
          - projMngmnt
    steps:
      - uses: actions/checkout@v4
      - name: Install LaTeX packages
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-fonts-recommended texlive-bibtex-extra texlive-science
      - name: Compile LaTeX in ${{ matrix.directory }}
        working-directory: docs/${{ matrix.directory }}
        run: |
          SKIP_FILES="Common.tex Comments.tex"
          find . -maxdepth 1 -name "*.tex" -type f | while read texfile; do
            filename=$(basename "$texfile")
            if echo "$SKIP_FILES" | grep -q "$filename"; then echo "Skipping include file: $filename"; continue; fi
            if grep -q "\\documentclass" "$texfile"; then
              echo "Compiling: $filename"
              if grep -qE '\\bibliography\{|\\bibliographystyle\{' "$texfile"; then
                echo "  Running full compilation with bibtex"
                pdflatex -interaction=nonstopmode "$filename" || { echo "ERROR: pass 1 failed"; exit 1; }
                if [ -f "${filename%.tex}.aux" ] && grep -qE '\\citation\{' "${filename%.tex}.aux" 2>/dev/null; then
                  bibtex "${filename%.tex}" 2>&1 | grep -v "I found no" || { echo "ERROR: bibtex failed"; exit 1; }
                fi
                pdflatex -interaction=nonstopmode "$filename" || { echo "ERROR: pass 2 failed"; exit 1; }
                pdflatex -interaction=nonstopmode "$filename" || { echo "ERROR: pass 3 failed"; exit 1; }
              else
                echo "  Running simple compilation"
                pdflatex -interaction=nonstopmode "$filename" || { echo "ERROR: pass 1 failed"; exit 1; }
                pdflatex -interaction=nonstopmode "$filename" || { echo "ERROR: pass 2 failed"; exit 1; }
              fi
            fi
          done
      - name: Check for LaTeX overflow warnings (disabled)
        working-directory: docs/${{ matrix.directory }}
        run: |
          echo "Overflow check disabled - skipping overflow warning validation"

  latex-compile-check:
    name: LaTeX Compilation Check
    runs-on: ubuntu-latest
    needs: [detect-changes, latex-compile]
    if: always() && needs.detect-changes.result == 'success'
    steps:
      - name: Check LaTeX compilation status
        run: |
          if [ "${{ needs.detect-changes.outputs.latex }}" != "true" ]; then
            echo "No LaTeX changes; compilation gate not required."
            exit 0
          fi
          if [ "${{ needs.latex-compile.result }}" != "success" ]; then
            echo "One or more LaTeX directories failed to compile"
            exit 1
          fi

  ci:
    name: CI
    runs-on: ubuntu-latest
    if: always()
    needs:
      [
        type-check,
        lint,
        format-check,
        build,
        test,
        latex-lint,
        latex-format-check,
        latex-compile-check,
      ]
    steps:
      - name: Check Status
        run: |
          bad=0
          check() {
            r="$1"
            name="$2"
            case "$r" in
              failure|cancelled)
                echo "❌ $name result=$r"
                bad=1
                ;;
            esac
          }
          check "${{ needs.type-check.result }}" type-check
          check "${{ needs.lint.result }}" lint
          check "${{ needs.format-check.result }}" format-check
          check "${{ needs.build.result }}" build
          check "${{ needs.test.result }}" test
          check "${{ needs['latex-lint'].result }}" latex-lint
          check "${{ needs['latex-format-check'].result }}" latex-format-check
          check "${{ needs['latex-compile-check'].result }}" latex-compile-check
          if [ "$bad" -ne 0 ]; then
            echo "One or more required jobs failed or were cancelled."
            exit 1
          fi
          echo "✅ All checks passed."
